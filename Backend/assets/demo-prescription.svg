<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Demo prescription</title>
  <desc id="desc">Sample prescription document for pharmacist review testing.</desc>
  <rect width="900" height="1200" fill="#f8fafc"/>
  <rect x="70" y="64" width="760" height="1072" rx="34" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <rect x="70" y="64" width="760" height="170" rx="34" fill="#ecfdf5"/>
  <text x="110" y="140" fill="#064e3b" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">Campus Health Clinic</text>
  <text x="110" y="188" fill="#0f766e" font-family="Arial, Helvetica, sans-serif" font-size="24">Digital prescription for pharmacy verification</text>
  <text x="650" y="150" fill="#064e3b" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700">Rx</text>
  <line x1="110" y1="294" x2="790" y2="294" stroke="#cbd5e1" stroke-width="2"/>
  <text x="110" y="352" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Patient</text>
  <text x="300" y="352" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="28">Jane Smith</text>
  <text x="110" y="412" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Date</text>
  <text x="300" y="412" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="28">04/05/2026</text>
  <text x="110" y="472" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Prescriber</text>
  <text x="300" y="472" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="28">Dr. Sarah Smith</text>
  <line x1="110" y1="528" x2="790" y2="528" stroke="#cbd5e1" stroke-width="2"/>
  <text x="110" y="600" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Medication</text>
  <text x="110" y="670" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="30">Amoxicillin 250mg</text>
  <text x="110" y="725" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="26">Take one capsule twice daily after meals.</text>
  <text x="110" y="780" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="26">Duration: 7 days</text>
  <text x="110" y="835" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="26">Quantity: 14 capsules</text>
  <line x1="110" y1="910" x2="520" y2="910" stroke="#94a3b8" stroke-width="3"/>
  <text x="110" y="956" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="22">Prescriber signature</text>
  <rect x="585" y="850" width="205" height="110" rx="16" fill="#f0fdfa" stroke="#99f6e4" stroke-width="2"/>
  <text x="618" y="897" fill="#0f766e" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">For pharmacist</text>
  <text x="618" y="930" fill="#0f766e" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">review only</text>
  <text x="110" y="1050" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="18">Demo document generated for Student Health and Wellness Portal testing.</text>
</svg>
